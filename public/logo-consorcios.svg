<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo azul oscuro -->
  <rect width="200" height="200" rx="20" fill="#080D1A"/>
  
  <!-- Edificio principal (centro) -->
  <rect x="72" y="60" width="56" height="90" rx="3" fill="#1A3FA0"/>
  <!-- Ventanas edificio central -->
  <rect x="80" y="72" width="12" height="10" rx="1" fill="#7AB4FF" opacity="0.9"/>
  <rect x="97" y="72" width="12" height="10" rx="1" fill="#7AB4FF" opacity="0.9"/>
  <rect x="80" y="88" width="12" height="10" rx="1" fill="#7AB4FF" opacity="0.9"/>
  <rect x="97" y="88" width="12" height="10" rx="1" fill="#7AB4FF" opacity="0.5"/>
  <rect x="80" y="104" width="12" height="10" rx="1" fill="#7AB4FF" opacity="0.9"/>
  <rect x="97" y="104" width="12" height="10" rx="1" fill="#7AB4FF" opacity="0.9"/>
  <!-- Puerta edificio central -->
  <rect x="87" y="128" width="26" height="22" rx="2" fill="#0A1628"/>
  
  <!-- Edificio izquierdo -->
  <rect x="30" y="82" width="38" height="68" rx="3" fill="#1A3FA0" opacity="0.7"/>
  <rect x="37" y="92" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="52" y="92" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="37" y="106" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.5"/>
  <rect x="52" y="106" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="37" y="120" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="52" y="120" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  
  <!-- Edificio derecho -->
  <rect x="132" y="82" width="38" height="68" rx="3" fill="#1A3FA0" opacity="0.7"/>
  <rect x="139" y="92" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="154" y="92" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="139" y="106" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.5"/>
  <rect x="154" y="106" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="139" y="120" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  <rect x="154" y="120" width="10" height="8" rx="1" fill="#7AB4FF" opacity="0.7"/>
  
  <!-- Línea de suelo -->
  <rect x="20" y="150" width="160" height="3" rx="1" fill="#1A3FA0"/>
  
  <!-- Texto GASP -->
  <text x="100" y="174" font-family="Arial,sans-serif" font-size="18" font-weight="900" 
    fill="#FFFFFF" text-anchor="middle" letter-spacing="4">GASP</text>
  
  <!-- Texto Consorcios -->
  <text x="100" y="188" font-family="Arial,sans-serif" font-size="8" font-weight="400"
    fill="#7AB4FF" text-anchor="middle" letter-spacing="2">CONSORCIOS</text>
    
  <!-- Punto de acento azul brillante arriba del edificio central -->
  <rect x="93" y="50" width="14" height="8" rx="2" fill="#4A90D9"/>
